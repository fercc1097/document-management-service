spring:
  application:
    name: document-management-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/challenge}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:5}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: document_schema
    open-in-view: false
  servlet:
    multipart:
      enabled: false   # the service never receives file bytes

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${TOMCAT_MAX_THREADS:20}

minio:
  internal-endpoint: ${MINIO_INTERNAL_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:document-bucket}
  presigned-put-expiry-seconds: ${MINIO_PUT_EXPIRY:3600}
  presigned-get-expiry-seconds: ${MINIO_GET_EXPIRY:3600}
  max-file-size-bytes: ${MAX_FILE_SIZE_BYTES:524288000}
